<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>git-freshman | First PR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../shared/css/site.css" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container py-3">
      <h1 class="site-title mb-2">git-freshman 训练站点</h1>
      <p class="site-subtitle mb-0">静态托管 · 配置驱动 · GitHub 协作练习</p>
    </div>
  </header>

  <main class="container my-4">
    <div id="nav-root"></div>

    <section class="content-card mt-3">
      <div class="row g-3 align-items-start">
        <div class="col-12 col-lg-8">
          <h2 class="mb-2">第一个 Pull Request</h2>
          <p class="text-secondary mb-2">本页数据来自 <code>simulation/baseline/FIRST_PR_REFLECTIONS.md</code>。</p>
          <div class="alert alert-info mb-3">
            练习时请修改 Markdown 配置文件，不要直接改 HTML 或 JS。
          </div>
        </div>
        <div class="col-12 col-lg-4">
          <div class="small-panel">
            <h3 class="h6">练习步骤</h3>
            <ol class="mb-0">
              <li>编辑 <code>FIRST_PR_REFLECTIONS.md</code></li>
              <li>新增一条感想（列表项）</li>
              <li>提交并发起 PR</li>
            </ol>
          </div>
        </div>
      </div>

      <hr>

      <h3 class="h5">练习者感想</h3>
      <ul id="reflection-list" class="list-group list-group-flush"></ul>
      <p id="reflection-empty" class="text-secondary small mt-3 d-none">暂无内容，请先在配置文件中添加列表项。</p>
    </section>
  </main>

  <script type="module" src="./page.js"></script>
</body>
</html>
