<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>git-freshman | Simulation Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./shared/css/site.css" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container py-3">
      <h1 class="site-title mb-2">git-freshman 模拟站点入口</h1>
      <p class="site-subtitle mb-0">请选择练习页面：First PR 或 Product Board</p>
    </div>
  </header>

  <main class="container my-4">
    <section class="content-card">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <div class="small-panel h-100">
            <h2 class="h5">First PR 页面</h2>
            <p class="text-secondary mb-3">读取 FIRST_PR_REFLECTIONS.md，用于入门 PR 练习。</p>
            <a class="btn btn-primary" href="./first-pr/">进入 First PR</a>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="small-panel h-100">
            <h2 class="h5">Product Board 页面</h2>
            <p class="text-secondary mb-3">读取 PRODUCT_BOARD.md，展示任务看板（只读）。</p>
            <a class="btn btn-outline-primary" href="./product-board/">进入 Product Board</a>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
