<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>git-freshman | Product Board</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../shared/css/site.css" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container py-3">
      <h1 class="site-title mb-2">git-freshman 训练站点</h1>
      <p class="site-subtitle mb-0">Product Board 由 Markdown 配置驱动</p>
    </div>
  </header>

  <main class="container my-4">
    <div id="nav-root"></div>

    <section class="content-card mt-3">
      <div class="row g-3">
        <div class="col-12">
          <h2 class="mb-2">Product Board</h2>
          <p class="text-secondary mb-2">本页读取 <code>simulation/baseline/PRODUCT_BOARD.md</code> 并渲染任务看板。</p>
          <div class="alert alert-info mb-0">
            Product Board 页面只负责读取 Markdown 并展示任务。请直接修改 <code>PRODUCT_BOARD.md</code> 后提交 PR。
          </div>
        </div>
      </div>

      <hr>

      <div class="row row-cols-1 row-cols-md-3 g-3" id="board-columns"></div>
      <p id="board-empty" class="text-secondary small mt-3 d-none">暂无任务数据，请检查 PRODUCT_BOARD.md 内容。</p>
    </section>
  </main>

  <script type="module" src="./page.js"></script>
</body>
</html>
